name: Draugr Security Scan
description: Run Draugr security-scan orchestration in CI — scan your app from one descriptor, upload SARIF to code scanning.
author: Draugr
branding:
  icon: shield
  color: blue

inputs:
  saga:
    description: Path to the Saga descriptor to scan (e.g. draugr.saga.yaml).
    required: true
  version:
    description: >-
      Draugr release version to use (with or without a leading "v"), or "latest" for the
      newest published release. Pin a version for reproducible runs.
    required: false
    default: latest
  fail-on:
    description: >-
      Severity that fails the gate (error, warning, note). Empty uses Draugr's default (error).
    required: false
    default: ""
  fail-on-priority:
    description: Also fail the gate on any finding at or above this priority band (P1-P4).
    required: false
    default: ""
  min-priority:
    description: List findings at or above this priority band (P1-P4) in the console output.
    required: false
    default: ""
  cache-dir:
    description: Enable content-hash caching in this directory (relative to working-directory).
    required: false
    default: ""
  output:
    description: Directory to write report.json and results.sarif (relative to working-directory).
    required: false
    default: draugr-out
  working-directory:
    description: Directory to run Draugr in.
    required: false
    default: "."
  args:
    description: Extra raw arguments appended to `draugr scan` (escape hatch).
    required: false
    default: ""
  verify:
    description: >-
      Verify the release's cosign signature before use (installs cosign). The archive checksum
      is always verified regardless of this setting.
    required: false
    default: "true"
  tools:
    description: >-
      Provision the external scanners Draugr's controls use before scanning: `draugr tools
      install` for the binary tools (Trivy, Gitleaks, gosec) plus Semgrep via pipx. Set "true"
      when the runner doesn't already have them (e.g. the code-scanning starter workflow).
    required: false
    default: "false"
  mode:
    description: >-
      What the action does. "scan": run a full scan and let the Saga's publishers deliver
      results (e.g. `github` → code scanning). "diff": scan the pull request's base and head and
      upsert one sticky new/fixed comment (the Saga's publishers are suppressed so it never
      double-posts alongside code scanning). "auto" (default): pick "diff" on pull_request events
      and "scan" otherwise — so a single workflow does the right thing on both push and PRs.
    required: false
    default: auto
  fail-on-new:
    description: >-
      (diff mode) Fail the gate if a new finding is at or above this severity (error, warning,
      note). Empty does not fail on new findings.
    required: false
    default: ""
  fail-on-new-priority:
    description: (diff mode) Fail the gate if a new finding is at or above this priority band (P1-P4).
    required: false
    default: ""

outputs:
  sarif:
    description: Path to the merged SARIF report (results.sarif).
    value: ${{ steps.setup.outputs.sarif }}
  report:
    description: Path to the JSON report (report.json).
    value: ${{ steps.setup.outputs.report }}

runs:
  using: composite
  steps:
    - name: Resolve version, platform, and output paths
      id: setup
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_OUTPUT: ${{ inputs.output }}
        INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
        INPUT_MODE: ${{ inputs.mode }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        # Resolve the effective mode: auto → diff on a pull request, scan otherwise.
        mode="${INPUT_MODE:-auto}"
        if [ "$mode" = "auto" ]; then
          case "${GITHUB_EVENT_NAME:-}" in
            pull_request|pull_request_target) mode=diff ;;
            *) mode=scan ;;
          esac
        fi
        echo "mode=${mode}" >>"$GITHUB_OUTPUT"

        # Resolve the release tag (vX.Y.Z) to download.
        if [ "$INPUT_VERSION" = "latest" ] || [ -z "$INPUT_VERSION" ]; then
          tag=$(gh release view --repo draugr-dev/draugr --json tagName --jq .tagName)
        else
          tag="${INPUT_VERSION#v}" # strip any leading v
          tag="v${tag}"            # then re-add exactly one
        fi
        echo "tag=${tag}" >>"$GITHUB_OUTPUT"
        echo "version=${tag#v}" >>"$GITHUB_OUTPUT"

        # Map the runner platform to a goreleaser asset name.
        case "${RUNNER_OS}" in
          Linux)   os=linux ;;
          macOS)   os=darwin ;;
          Windows) os=windows ;;
          *) echo "::error::unsupported runner OS ${RUNNER_OS}"; exit 1 ;;
        esac
        case "${RUNNER_ARCH}" in
          X64)   arch=amd64 ;;
          ARM64) arch=arm64 ;;
          *) echo "::error::unsupported runner arch ${RUNNER_ARCH}"; exit 1 ;;
        esac
        if [ "$os" = "windows" ]; then ext=zip; else ext=tar.gz; fi
        echo "asset=draugr_${tag#v}_${os}_${arch}.${ext}" >>"$GITHUB_OUTPUT"
        echo "ext=${ext}" >>"$GITHUB_OUTPUT"

        # Output paths are deterministic from the inputs; emit them now so a caller's
        # `if: always()` upload step can still find the SARIF when the gate fails the scan.
        wd="${INPUT_WORKING_DIRECTORY%/}"
        if [ -z "$wd" ] || [ "$wd" = "." ]; then
          base="${INPUT_OUTPUT}"
        else
          base="${wd}/${INPUT_OUTPUT}"
        fi
        echo "sarif=${base}/results.sarif" >>"$GITHUB_OUTPUT"
        echo "report=${base}/report.json" >>"$GITHUB_OUTPUT"

    - name: Install cosign
      if: inputs.verify == 'true'
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

    - name: Download and verify Draugr ${{ steps.setup.outputs.tag }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        TAG: ${{ steps.setup.outputs.tag }}
        ASSET: ${{ steps.setup.outputs.asset }}
        EXT: ${{ steps.setup.outputs.ext }}
        VERIFY: ${{ inputs.verify }}
      run: |
        set -euo pipefail
        workdir=$(mktemp -d)
        cd "$workdir"

        # Download the archive and the signed checksums (new Sigstore bundle) from the release.
        gh release download "$TAG" --repo draugr-dev/draugr \
          --pattern "$ASSET" \
          --pattern 'checksums.txt' --pattern 'checksums.txt.sigstore.json'

        if [ "$VERIFY" = "true" ]; then
          # Verify the checksums file was signed by Draugr's release workflow (keyless cosign).
          cosign verify-blob \
            --bundle checksums.txt.sigstore.json \
            --certificate-identity-regexp '^https://github\.com/draugr-dev/draugr/\.github/workflows/release\.yml@refs/tags/v.*$' \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
            checksums.txt
        fi

        # Verify the downloaded archive matches the (signed) checksums — always.
        sha256sum --ignore-missing -c checksums.txt

        # Extract the draugr binary and put it on PATH for later steps.
        bindir="${workdir}/bin"
        mkdir -p "$bindir"
        if [ "$EXT" = "zip" ]; then
          unzip -o "$ASSET" draugr.exe -d "$bindir"
        else
          tar -xzf "$ASSET" -C "$bindir" draugr
        fi
        echo "$bindir" >>"$GITHUB_PATH"

    - name: Provision scanner tools
      if: inputs.tools == 'true'
      shell: bash
      run: |
        set -euo pipefail
        # Binary scanners (Trivy, Gitleaks, gosec) into ~/.draugr/bin, which draugr prepends to
        # PATH for its own scanner execution.
        draugr tools install -y
        # Semgrep ships as a Python package, so it comes via pipx (its bin dir on PATH).
        if ! command -v semgrep >/dev/null 2>&1; then
          pipx install semgrep
          echo "$HOME/.local/bin" >>"$GITHUB_PATH"
        fi

    - name: Run Draugr scan
      if: steps.setup.outputs.mode == 'scan'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INPUT_SAGA: ${{ inputs.saga }}
        INPUT_OUTPUT: ${{ inputs.output }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_FAIL_ON_PRIORITY: ${{ inputs.fail-on-priority }}
        INPUT_MIN_PRIORITY: ${{ inputs.min-priority }}
        INPUT_CACHE_DIR: ${{ inputs.cache-dir }}
        INPUT_ARGS: ${{ inputs.args }}
        # Forwarded so a Saga's `github` publisher can upload SARIF to code scanning. Uploading
        # requires the job to grant `permissions: security-events: write`. GITHUB_REPOSITORY/
        # _SHA/_REF/_API_URL are already present in the runner environment.
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        draugr version

        scan_args=("$INPUT_SAGA" --output "$INPUT_OUTPUT")
        [ -n "$INPUT_FAIL_ON" ]          && scan_args+=(--fail-on "$INPUT_FAIL_ON")
        [ -n "$INPUT_FAIL_ON_PRIORITY" ] && scan_args+=(--fail-on-priority "$INPUT_FAIL_ON_PRIORITY")
        [ -n "$INPUT_MIN_PRIORITY" ]     && scan_args+=(--min-priority "$INPUT_MIN_PRIORITY")
        [ -n "$INPUT_CACHE_DIR" ]        && scan_args+=(--cache-dir "$INPUT_CACHE_DIR")
        # shellcheck disable=SC2206  # intentional word-splitting of the raw args escape hatch
        [ -n "$INPUT_ARGS" ]             && scan_args+=($INPUT_ARGS)

        draugr scan "${scan_args[@]}"

    - name: Run Draugr diff
      if: steps.setup.outputs.mode == 'diff'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INPUT_SAGA: ${{ inputs.saga }}
        INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
        INPUT_CACHE_DIR: ${{ inputs.cache-dir }}
        INPUT_FAIL_ON_NEW: ${{ inputs.fail-on-new }}
        INPUT_FAIL_ON_NEW_PRIORITY: ${{ inputs.fail-on-new-priority }}
        INPUT_ARGS: ${{ inputs.args }}
        # base SHA of the PR; head is the current checkout. Requires the caller to check out with
        # fetch-depth: 0 so the base commit is present.
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
        # For the sticky PR comment (github-pr-comment publisher). Needs pull-requests: write.
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        draugr version

        if [ -z "${BASE_SHA:-}" ]; then
          echo "::error::diff mode requires a pull_request event (no base SHA in context)"; exit 1
        fi

        base_out="${RUNNER_TEMP}/draugr-base"
        head_out="${RUNNER_TEMP}/draugr-head"
        worktree="${RUNNER_TEMP}/draugr-base-src"
        wd="${INPUT_WORKING_DIRECTORY:-.}"

        # Publishers are suppressed on both sides: the diff itself posts the one comment, and this
        # keeps a Saga's `github` publisher from also uploading to code scanning on the PR.
        scan_common=(--no-publish)
        [ -n "$INPUT_CACHE_DIR" ] && scan_common+=(--cache-dir "$INPUT_CACHE_DIR")
        # shellcheck disable=SC2206  # intentional word-splitting of the raw args escape hatch
        [ -n "$INPUT_ARGS" ] && scan_common+=($INPUT_ARGS)

        # Head = current checkout (this step's working-directory).
        draugr scan "$INPUT_SAGA" -o "$head_out" "${scan_common[@]}" || true

        # Base = the PR target commit, scanned in a detached worktree.
        git fetch --no-tags --depth 1 origin "$BASE_SHA" 2>/dev/null || true
        git worktree add --detach "$worktree" "$BASE_SHA"
        ( cd "$worktree/$wd" && draugr scan "$INPUT_SAGA" -o "$base_out" "${scan_common[@]}" ) || true
        git worktree remove --force "$worktree" 2>/dev/null || true

        diff_args=("$base_out/results.sarif" "$head_out/results.sarif" --publish)
        [ -n "$INPUT_FAIL_ON_NEW" ]          && diff_args+=(--fail-on-new "$INPUT_FAIL_ON_NEW")
        [ -n "$INPUT_FAIL_ON_NEW_PRIORITY" ] && diff_args+=(--fail-on-new-priority "$INPUT_FAIL_ON_NEW_PRIORITY")
        draugr diff "${diff_args[@]}"
