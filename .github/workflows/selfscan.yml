name: Self-scan

# Dogfood: run the latest released Draugr against this repo (see issue #64).
# Uses a stable release (not a source build) — the way real users consume Draugr.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  # These versions are the single source of truth's mirror: they MUST match the pinned
  # manifest in internal/tools/install.go (trivy/gitleaks) and internal/tools/tools.go
  # (semgrep). internal/tools TestSelfscanPinsMatchManifest fails CI if they drift — so the
  # tools Draugr ships (`draugr tools install`) are exactly the ones the self-scan validates.
  TRIVY_VERSION: "0.69.3"
  GITLEAKS_VERSION: "8.30.1"
  GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
  # Pinned Semgrep (pip verifies the PyPI package hash for this exact version).
  SEMGREP_VERSION: "1.169.0"

jobs:
  selfscan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # publish the self-scan SARIF to GitHub code scanning (#64)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          version: v${{ env.TRIVY_VERSION }}

      - name: Install Gitleaks
        run: |
          set -euo pipefail
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSLO "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}"
          echo "${GITLEAKS_SHA256}  ${tarball}" | sha256sum -c -
          tar -xzf "$tarball" gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Install Semgrep
        run: |
          set -euo pipefail
          pipx install "semgrep==${SEMGREP_VERSION}"
          semgrep --version

      - name: Draugr self-scan
        id: draugr
        continue-on-error: true # non-blocking for now; tighten with fail-on later
        # Dogfood our own first-party action (the local checkout, so PRs test action changes
        # before they ship). The action downloads + cosign-verifies the latest release and
        # runs the scan, replacing the hand-rolled download+verify+run steps above.
        #
        # The Saga's `github` publisher uploads the SARIF to code scanning as part of the scan
        # — dogfooding the OSS Publisher instead of a separate upload-sarif step (#58). The
        # action forwards GITHUB_TOKEN; the job grants `security-events: write` above.
        uses: ./
        with:
          saga: .draugr/self.saga.yaml
          output: draugr-out

      - name: Upload evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: draugr-selfscan
          path: draugr-out/
          if-no-files-found: warn
