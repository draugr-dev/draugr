name: Self-scan

# Dogfood: run the latest released Draugr against this repo (see issue #64).
# Uses a stable release (not a source build) — the way real users consume Draugr.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  # Pinned so the download is reproducible and integrity-checked (sha256 below).
  GITLEAKS_VERSION: "8.30.1"
  GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
  # Pinned Semgrep (pip verifies the PyPI package hash for this exact version).
  SEMGREP_VERSION: "1.169.0"

jobs:
  selfscan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1

      - name: Install Gitleaks
        run: |
          set -euo pipefail
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSLO "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}"
          echo "${GITLEAKS_SHA256}  ${tarball}" | sha256sum -c -
          tar -xzf "$tarball" gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Install Semgrep
        run: |
          set -euo pipefail
          pipx install "semgrep==${SEMGREP_VERSION}"
          semgrep --version

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Download, verify, and install the latest Draugr release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Always dogfood the latest published release (the way real users consume Draugr).
          # No tag → gh downloads the latest non-draft, non-prerelease release.
          gh release download --repo draugr-dev/draugr \
            --pattern 'draugr_*_linux_amd64.tar.gz' \
            --pattern 'checksums.txt' --pattern 'checksums.txt.pem' --pattern 'checksums.txt.sig'

          # Verify the checksums file was signed by our release workflow (keyless cosign).
          cosign verify-blob \
            --certificate checksums.txt.pem \
            --signature checksums.txt.sig \
            --certificate-identity-regexp '^https://github\.com/draugr-dev/draugr/\.github/workflows/release\.yml@refs/tags/v.*$' \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
            checksums.txt

          # Verify our downloaded archive matches the signed checksums.
          sha256sum --ignore-missing -c checksums.txt

          tar -xzf draugr_*_linux_amd64.tar.gz draugr
          ./draugr version

      - name: Draugr self-scan
        continue-on-error: true # non-blocking for now; tighten with --fail-on later
        run: ./draugr scan .draugr/self.saga.yaml --output draugr-out --log-level warn

      - name: Upload evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: draugr-selfscan
          path: draugr-out/
          if-no-files-found: warn
