# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# Draugr scans an application described by a single descriptor (draugr.saga.yaml) — running
# SAST, SCA, secret, IaC, and container-image controls — and uploads the results to code
# scanning. Create a draugr.saga.yaml first: https://github.com/draugr-dev/draugr#quickstart

name: Draugr

on:
  push:
    branches: [ "$default-branch", "$protected-branches" ]
  pull_request:
    branches: [ "$default-branch" ]
  schedule:
    - cron: $cron-weekly

permissions:
  contents: read

jobs:
  draugr:
    name: Draugr scan
    runs-on: ubuntu-latest
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Draugr
        id: draugr
        uses: draugr-dev/draugr@REPLACE_WITH_RELEASE_SHA # vX.Y.Z
        with:
          saga: draugr.saga.yaml
          tools: true # provision the scanners the Saga's controls use

      - name: Upload results to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.draugr.outputs.sarif }}
